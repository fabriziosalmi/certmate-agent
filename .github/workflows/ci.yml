name: ci

# Fast checks on every PR + push to main: lint with ruff, run the test
# suite. Network-free — these tests don't talk to LM Studio or CertMate.

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "agent/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      matrix:
        # Match the Dockerfile (python:3.12-slim) + give a head-of-line
        # signal on 3.13 so dependency breakage is visible early.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check agent tests

      - name: Tests
        run: pytest tests -v
