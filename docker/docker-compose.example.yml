# Example deployment.
#
# The agent answers from the CertMate documentation. It holds no CertMate
# credential and talks to no CertMate instance, so there is nothing to point
# it at beyond the LLM endpoint.
#
# Adjust:
#   - LMSTUDIO_URL to your host
#   - AGENT_ADMIN_TOKEN to enable /reindex (leave empty to disable)
#
# Full per-variable docs live in `.env.example` at the repo root —
# the comments below are abbreviated for compose's narrower context.
#
# Build once, run, then build the docs index inside the container with:
#   docker compose exec certmate-agent python -m agent.rag.indexer

services:
  certmate-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: certmate-agent:latest
    container_name: certmate-agent
    restart: unless-stopped
    # On macOS use host.docker.internal for the LM Studio host running
    # on the host machine; on Linux a Tailscale IP or LAN address of
    # the workstation is reachable directly from the container.
    environment:
      # ----- LM Studio (OpenAI-compatible) -----
      # Base URL of the chat+embeddings endpoint, override via host .env.
      LMSTUDIO_URL: "${LMSTUDIO_URL:-http://host.docker.internal:1234/v1}"
      # Chat model id served by LMSTUDIO_URL.
      LMSTUDIO_CHAT_MODEL: "google/gemma-4-e2b"
      # Embedding model id (must match what built the docs index).
      LMSTUDIO_EMBED_MODEL: "text-embedding-embeddinggemma-300m"
      # Bearer token for the LLM endpoint; "lm-studio" is the convention
      # for a local LM Studio install with auth not enforced.
      LMSTUDIO_API_KEY: "lm-studio"
      # HTTP timeout for chat completions.
      LMSTUDIO_TIMEOUT_SECONDS: "120"

      # ----- Agent service -----
      # Bind on 0.0.0.0 inside the container — exposed via the ports
      # map below, which binds to 127.0.0.1 on the host.
      AGENT_HOST: "0.0.0.0"
      # Listening port inside the container.
      AGENT_PORT: "8765"
      # SQLite file path on the mounted volume.
      AGENT_DB_PATH: "/data/agent.db"
      # RAG index path on the mounted volume (gzipped JSON).
      AGENT_INDEX_PATH: "/data/docs_index/index.json.gz"
      # CORS allowlist; drives CSP frame-ancestors too.
      AGENT_CORS_ORIGINS: "${AGENT_CORS_ORIGINS:-http://localhost:8000}"
      # Standard Python log level.
      AGENT_LOG_LEVEL: "INFO"
      # Max output tokens per LLM call.
      AGENT_MAX_TOKENS: "2048"
      # LLM sampling temperature.
      AGENT_TEMPERATURE: "0.2"

      # ----- Admin -----
      # Secret to enable /reindex and other admin slash commands.
      # Empty disables admin commands entirely.
      AGENT_ADMIN_TOKEN: "${AGENT_ADMIN_TOKEN:-}"

      # ----- Conversation persistence -----
      # Store conversation history in sqlite keyed by session_id.
      AGENT_PERSIST_CONVERSATIONS: "true"
      # Retention for persisted messages.
      AGENT_CONVERSATION_TTL_DAYS: "30"
      # HMAC secret for /conversations/{id} ownership tokens. Set a long
      # random value; empty => process-local random (won't survive a
      # restart and won't validate across workers).
      AGENT_SESSION_SECRET: "${AGENT_SESSION_SECRET:-}"

      # ----- Background cleanup (TTL pruning) -----
      # Cleanup pass interval; 0 disables the scheduler.
      AGENT_CLEANUP_INTERVAL_SECONDS: "3600"

      # ----- Optional fallback LLM (OpenRouter). Empty disables. -----
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-meta-llama/llama-3.3-8b-instruct:free}"
      # Trip the primary breaker after N consecutive failures.
      LLM_PRIMARY_FAILURE_THRESHOLD: "3"
      # Keep the breaker tripped for N seconds before retrying.
      LLM_PRIMARY_COOLDOWN_SECONDS: "60"
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - certmate-agent-data:/data
    # Uncomment if your CertMate runs in another compose stack on a
    # shared network; otherwise the explicit URL above is enough.
    # networks:
    #   - certmate-net

volumes:
  certmate-agent-data:

