<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CertMate-Agent — test page</title>
  <link rel="stylesheet" href="certmate-agent.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      background: #fafafa;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0c0c0d; color: #e5e5e5; }
    }
    header {
      padding: .75rem 1.2rem;
      border-bottom: 1px solid rgba(0,0,0,.08);
      display: flex; align-items: baseline; gap: 1rem;
      font-size: .85rem;
    }
    @media (prefers-color-scheme: dark) {
      header { border-bottom-color: rgba(255,255,255,.08); }
    }
    header h1 { font-size: 1rem; margin: 0; }
    header .muted { color: #666; }
    @media (prefers-color-scheme: dark) {
      header .muted { color: #999; }
    }
    main {
      min-height: 0;          /* let the widget shrink/grow inside the grid */
      display: flex;
    }
    certmate-agent {
      flex: 1;
      min-width: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>CertMate-Agent</h1>
    <span class="muted">Local test page — full-viewport. Embed elsewhere as
      <code>&lt;certmate-agent endpoint="…"&gt;&lt;/certmate-agent&gt;</code>.
    </span>
  </header>
  <main>
    <certmate-agent fill endpoint="http://127.0.0.1:8770"></certmate-agent>
  </main>
  <script type="module" src="certmate-agent.js"></script>
</body>
</html>
